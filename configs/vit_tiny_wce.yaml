model:
  name: vit_tiny_patch16_224
  pretrained: true
  num_classes: 7

data:
  image_size: 224
  batch_size: 32

train:
  num_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  mixed_precision: true
  seed: 42

loss:
  name: weighted_ce
  focal_gamma: 2.0

mlflow:
  experiment: skin-lesion-classifier
  run_name: vit_tiny-wce-seed42
